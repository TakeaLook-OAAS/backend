version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: projectgraduate_db
    restart: always
    environment:
      POSTGRES_USER: admin01
      POSTGRES_PASSWORD: admin01
      POSTGRES_DB: OAAS_DB
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # redis:
  #   image: redis:7-alpine
  #   container_name: asdf_redis
  #   command: redis-server --appendonly yes
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data: {}